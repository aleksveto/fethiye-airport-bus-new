<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Фетхие → Dalaman Airport</title>

<style>
body{font-family:Arial;text-align:center;background:#f5f5f5;padding:20px}
table{margin:auto;border-collapse:collapse;background:white}
td,th{border:1px solid #ccc;padding:8px 12px}
th{background:#eee}
.next{background:#e8f5e9;font-weight:bold}
button{padding:10px 18px;font-size:16px;margin:10px}
</style>

</head>

<body>

<h2>Автобусы Фетхие → Dalaman Airport</h2>

<button onclick="load()">Показать расписание</button>

<div id="table"></div>

<br>

<a href="https://t.me/ВАШ_ЧАТ" target="_blank">
<button>Чат Фетхие в Telegram</button>
</a>

<script>

function timeToMin(t){
let p=t.split(":")
return p[0]*60 + parseInt(p[1])
}

async function load(){

let data=await fetch("schedule.json").then(r=>r.json())

let now=new Date()
let cur=now.getHours()*60+now.getMinutes()

data=data.filter(b=>timeToMin(b.time)>=cur)

data.sort((a,b)=>timeToMin(a.time)-timeToMin(b.time))

let html="<table><tr><th>Время</th><th>Перевозчик</th></tr>"

data.forEach((b,i)=>{

if(i==0){
html+="<tr class='next'>"
}else{
html+="<tr>"
}

html+="<td>"+b.time+"</td><td>"+b.company+"</td></tr>"

})

html+="</table>"

document.getElementById("table").innerHTML=html

}

</script>

</body>
</html>
